{% extends "base.html" %}

{% block content %}
<h1 class="page-title">Orders</h1>
<p class="page-sub">Working orders and your complete order history.</p>

<div class="card">
  <h2>Open orders</h2>
  <table class="orders-table">
    <thead>
      <tr>
        <th class="col-placed">Placed</th>
        <th class="col-symbol">Symbol</th>
        <th class="col-side">Side</th>
        <th class="col-type">Type</th>
        <th class="num col-qty">Qty</th>
        <th class="num col-limit">Limit</th>
        <th class="num col-actions"></th>
      </tr>
    </thead>
    <tbody id="open-orders-body">
      <tr><td colspan="7" class="empty-note">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="card">
  <div class="filter-row">
    <h2 style="margin:0; flex:1">All orders</h2>
    <input type="text" id="symbol-filter" placeholder="Symbol (e.g. AAPL)" style="max-width: 140px;" />
    <select id="status-filter">
      <option value="">All statuses</option>
      <option value="open">Open</option>
      <option value="filled">Filled</option>
      <option value="canceled">Canceled</option>
      <option value="rejected">Rejected</option>
    </select>
  </div>
  <table class="orders-table">
    <thead>
      <tr>
        <th class="col-placed">Placed</th>
        <th class="col-symbol">Symbol</th>
        <th class="col-side">Side</th>
        <th class="col-type">Type</th>
        <th class="num col-qty">Qty</th>
        <th class="num col-limit">Limit</th>
        <th class="num col-fill-price">Fill price</th>
        <th class="col-status">Status</th>
      </tr>
    </thead>
    <tbody id="all-orders-body">
      <tr><td colspan="8" class="empty-note">Loading…</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/orders.js"></script>
{% endblock %}
