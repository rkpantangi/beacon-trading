<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · Beacon Trading</title>
  <script>
    // Apply the saved theme before first paint to avoid a flash.
    (function () {
      var t = localStorage.getItem("theme") ||
        (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><span class="logo">◉</span> Beacon Trading</a>
    <nav>
      <a href="/" class="{{ 'active' if active == '/' else '' }}">Browse</a>
      <a href="/positions" class="{{ 'active' if active == '/positions' else '' }}">Positions</a>
      <a href="/orders" class="{{ 'active' if active == '/orders' else '' }}">Orders</a>
      <a href="/history" class="{{ 'active' if active == '/history' else '' }}">History</a>
      <a href="/balances" class="{{ 'active' if active == '/balances' else '' }}">Balances</a>
    </nav>
    <div class="topbar-right">
      <span class="bp-chip" title="Buying power">BP <b id="nav-buying-power">—</b></span>
      <button class="icon-btn" id="theme-toggle" title="Toggle dark / light mode">◐</button>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- Order ticket: right slide-in panel, available on every page -->
  <div class="panel-backdrop" id="panel-backdrop" hidden></div>
  <aside class="order-panel" id="order-panel" hidden aria-label="Order ticket">
    <div class="panel-header">
      <div>
        <div class="panel-symbol" id="op-symbol"></div>
        <div class="panel-name muted" id="op-name"></div>
      </div>
      <button class="icon-btn" id="op-close" title="Close">✕</button>
    </div>
    <div class="panel-price"><span id="op-price">—</span><span class="chg" id="op-change"></span></div>

    <div class="side-tabs">
      <button class="buy" id="op-side-buy">Buy</button>
      <button class="sell" id="op-side-sell">Sell</button>
    </div>

    <form id="op-form" autocomplete="off">
      <label>Order type
        <div class="seg" id="op-type-seg">
          <button type="button" data-type="market" class="active">Market</button>
          <button type="button" data-type="limit">Limit</button>
        </div>
      </label>
      <label>Quantity (shares)
        <input type="number" id="op-qty" min="0" step="any" placeholder="0">
      </label>
      <label id="op-limit-row" hidden>Limit price
        <input type="number" id="op-limit" min="0" step="0.01" placeholder="0.00">
      </label>
      <div class="est-row"><span class="muted" id="op-est-label">Estimated cost</span><b id="op-est">—</b></div>
      <div class="avail-note" id="op-avail"></div>
      <div class="form-error" id="op-error" hidden></div>
      <button type="submit" class="btn btn-buy" id="op-submit">Buy</button>
    </form>
  </aside>

  <div id="toasts"></div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/orderpanel.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
