# fly.toml app configuration file generated for agent-beacon-trading-paper on 2026-07-04T23:32:55-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agent-beacon-trading-paper'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile.mcp'

[env]
  TRADING_API_BASE_URL = 'https://beacon-trading-paper.fly.dev'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
